<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>bvds</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="logo" id="logoBtn">B</div>
      <h1>bvds <span style="font-size:0.625rem;color:var(--text3);font-weight:400;">v2</span></h1>
    </div>
    <div class="spacer"></div>
    <span id="loginBadge" class="login-badge off" onclick="if(!state.loggedIn)switchPage('login')">未登录</span>
  </header>
  <div id="progressBar" class="progress-bar"><div class="fill"></div></div>

  <!-- 主内容 -->
  <div class="main" id="main">

    <!-- ====== 登录页 ====== -->
    <div id="pageLogin" class="page">
      <div class="card" style="text-align:center;">
        <div class="card-title">扫码登录</div>
        <div class="login-qr-wrap">
          <img id="qrImage" src="" alt="二维码加载中...">
          <div id="loginStatus" class="login-status waiting">正在生成二维码...</div>
        </div>
        <p style="font-size:0.75rem;color:var(--text2);line-height:1.7;margin-bottom:0.75rem;">
          1. 打开B站APP → 我的 → 右上角扫码<br>
          2. 扫描上方二维码 → 在手机上确认登录<br>
          <strong style="color:var(--accent);">登录后可下载更高画质视频</strong>
        </p>
        <button class="btn btn-ghost btn-full" onclick="skipLogin()">跳过登录（游客模式）</button>
      </div>
    </div>

    <!-- ====== 主页 ====== -->
    <div id="pageHome" class="page">
      <div class="menu-grid">
        <div class="menu-item" onclick="goDownload()">
          <div class="icon dl">↓</div>
          <div class="label">下载</div>
          <div class="sub">单视频 / 批量</div>
        </div>
        <div class="menu-item" onclick="goSettings()">
          <div class="icon set">⚙</div>
          <div class="label">设置</div>
          <div class="sub">清晰度 / 目录</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">状态</div>
        <div class="info-row"><span class="key">下载目录</span><span class="val" id="infoDir">-</span></div>
        <div class="info-row"><span class="key">默认清晰度</span><span class="val" id="infoQuality">-</span></div>
        <div class="info-row"><span class="key">登录状态</span><span class="val" id="infoLogin">-</span></div>
      </div>
    </div>

    <!-- ====== 下载页 ====== -->
    <div id="pageDownload" class="page">
      <div class="card">
        <div class="card-title">视频地址</div>
        <textarea id="inputUrls" class="input" placeholder="粘贴B站视频链接&#10;多个链接用空格、逗号或换行分隔"></textarea>
        <div style="font-size:0.6875rem;color:var(--text2);margin-top:0.5rem;">
          已识别 <strong id="urlCount" style="color:var(--accent);">0</strong> 个链接
        </div>
        <div class="url-list" id="urlList"></div>
      </div>

      <div class="card">
        <div class="card-title">下载模式</div>
        <div class="mode-select" id="modeSelect">
          <button data-mode="1">仅视频</button>
          <button data-mode="3" class="active">视频+音频</button>
          <button data-mode="2">仅音频</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">清晰度</div>
        <select id="qualitySelect">
          <option value="1">4K 超高清</option>
          <option value="2" selected>1080P 高清</option>
          <option value="3">720P 准高清</option>
          <option value="4">480P 清晰</option>
          <option value="5">360P 流畅</option>
        </select>
      </div>

      <button class="btn btn-pri btn-full" id="startDownloadBtn" onclick="startDownload()" style="padding:0.875rem;font-size:1rem;">
        开始下载
      </button>
      <div style="display:flex; gap:0.75rem;">
        <button class="btn btn-ghost btn-full" onclick="goProgress()">查看进度</button>
        <button class="btn btn-ghost btn-full" onclick="switchPage('home')">返回主页</button>
      </div>
    </div>

    <!-- ====== 进度页 ====== -->
    <div id="pageProgress" class="page">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1rem;">
        <span style="font-size:0.75rem;color:var(--text2);">
          任务: <strong id="taskStats" style="color:var(--text);">0 / 0</strong>
        </span>
        <button class="btn btn-sm btn-ghost" onclick="clearTasks()">清空已完成</button>
      </div>
      <div class="task-list" id="taskList">
        <div class="empty"><div class="icon">—</div><div class="label">暂无下载任务</div></div>
      </div>
      <button class="btn btn-ghost btn-full" onclick="switchPage('download')">返回下载</button>
    </div>

    <!-- ====== 设置页 ====== -->
    <div id="pageSettings" class="page">
      <div class="card">
        <div class="card-title">下载目录</div>
        <div class="input-group">
          <input id="inputDir" placeholder="输入下载目录路径">
          <button class="btn btn-ghost btn-sm" onclick="resetDownloadDir()" style="align-self:flex-start;">恢复默认</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">默认清晰度</div>
        <div class="setting-row">
          <span class="label">选择画质</span>
          <select id="defaultQualitySelect">
            <option value="1">4K 超高清</option>
            <option value="2" selected>1080P 高清</option>
            <option value="3">720P 准高清</option>
            <option value="4">480P 清晰</option>
            <option value="5">360P 流畅</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">个性化</div>
        <div class="setting-row">
          <span class="label">主题色</span>
          <select id="themeSelect" onchange="applyTheme(this.value)">
            <option value="teal">青色</option>
            <option value="amber">琥珀</option>
          </select>
        </div>
      </div>

      <div class="card" style="border-color:rgba(239,68,68,.15);">
        <div class="card-title" style="color:var(--danger);">账号</div>
        <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
      </div>

      <button class="btn btn-ghost btn-full" onclick="switchPage('home')">返回主页</button>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- 日志面板（长按 Logo 打开） -->
  <div id="logPanel" class="log-panel">
    <div class="log-head">
      <span>调试日志</span>
      <button onclick="copyLog()">复制</button>
      <button onclick="exportLog()">导出</button>
      <button onclick="clearLog()">清空</button>
      <button onclick="closeLog()">关闭</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
